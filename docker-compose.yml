services:
  db:
    image: postgres:16-alpine
    container_name: agentos-postgres
    environment:
      POSTGRES_USER: agentos
      POSTGRES_PASSWORD: agentos_dev
      POSTGRES_DB: agentos
    ports:
      - "5432:5432"
    volumes:
      - agentos_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentos -d agentos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agentos_db_data:
